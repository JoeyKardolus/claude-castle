<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Castle Notulen</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #4a9eff;
    --accent-dim: #2a5a9e;
    --red: #e54545;
    --green: #3ddc84;
    --orange: #f0a030;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ─────────────────────────────────────────── */
  header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 20px; font-weight: 600; }
  header p { font-size: 13px; color: var(--text-dim); margin-top: 2px; }

  /* ── Sections ───────────────────────────────────────── */
  .section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  /* ── Form fields ────────────────────────────────────── */
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .field input {
    width: 100%;
    padding: 10px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    outline: none;
  }
  .field input:focus { border-color: var(--accent); }
  .field textarea {
    width: 100%;
    padding: 10px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    resize: vertical;
    min-height: 60px;
  }
  .field textarea:focus { border-color: var(--accent); }

  /* ── Attendee chips ─────────────────────────────────── */
  .chip-suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }
  .chip {
    padding: 5px 12px;
    border-radius: 16px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-dim);
    transition: all 0.15s;
    user-select: none;
    -webkit-user-select: none;
  }
  .chip.selected {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--text);
  }
  .chip:active { transform: scale(0.95); }

  /* ── Record button ──────────────────────────────────── */
  .record-area { text-align: center; padding: 20px 0; }

  .rec-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid var(--border);
    background: var(--surface-2);
    cursor: pointer;
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .rec-btn:active { transform: scale(0.95); }
  .rec-btn .dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--red);
    transition: all 0.3s;
  }
  .rec-btn.recording { border-color: var(--red); }
  .rec-btn.recording .dot {
    width: 24px;
    height: 24px;
    border-radius: 4px;
  }

  .rec-status {
    margin-top: 12px;
    font-size: 14px;
    color: var(--text-dim);
    min-height: 20px;
  }
  .rec-status.active { color: var(--red); }
  .rec-status.dead {
    color: var(--red);
    background: #3a1a1a;
    padding: 8px 12px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .timer {
    font-size: 32px;
    font-weight: 300;
    font-variant-numeric: tabular-nums;
    margin-top: 8px;
    color: var(--text);
    display: none;
  }
  .timer.visible { display: block; }

  /* ── Waveform ───────────────────────────────────────── */
  .waveform {
    height: 48px;
    margin-top: 12px;
    display: none;
  }
  .waveform.visible { display: block; }
  .waveform canvas {
    width: 100%;
    height: 100%;
    border-radius: 6px;
  }

  /* ── Processing status ──────────────────────────────── */
  .processing {
    text-align: center;
    padding: 24px 16px;
    display: none;
  }
  .processing.visible { display: block; }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .processing-label {
    font-size: 14px;
    color: var(--text-dim);
  }

  /* ── Job list ───────────────────────────────────────── */
  .job-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .job-card:hover { border-color: var(--accent-dim); }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .job-title { font-size: 15px; font-weight: 500; }
  .job-meta { font-size: 12px; color: var(--text-dim); }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .badge-pending { background: var(--surface-2); color: var(--text-dim); }
  .badge-transcribing { background: #1a3a5c; color: var(--accent); }
  .badge-structuring { background: #3a2a1a; color: var(--orange); }
  .badge-committing { background: #2a2a3a; color: var(--accent); }
  .badge-complete { background: #1a3a2a; color: var(--green); }
  .badge-failed { background: #3a1a1a; color: var(--red); }

  /* ── Job detail (expanded) ──────────────────────────── */
  .job-detail {
    display: none;
    margin-top: 12px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }
  .job-detail.open { display: block; }

  .tab-bar {
    display: flex;
    gap: 0;
    margin-bottom: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .tab {
    flex: 1;
    padding: 8px 0;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    background: var(--surface-2);
    border: none;
    color: var(--text-dim);
    cursor: pointer;
  }
  .tab.active {
    background: var(--accent-dim);
    color: var(--text);
  }
  .tab + .tab { border-left: 1px solid var(--border); }

  .tab-content {
    display: none;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    background: var(--surface-2);
    border-radius: 8px;
    padding: 12px;
    max-height: 400px;
    overflow-y: auto;
  }
  .tab-content.active { display: block; }

  .download-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 16px;
    background: var(--accent-dim);
    color: var(--text);
    border: none;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
  }
  .download-btn:hover { background: var(--accent); color: #fff; }

  .delete-btn {
    display: inline-block;
    margin-top: 10px;
    margin-left: 8px;
    padding: 8px 16px;
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
  }
  .delete-btn:hover { background: var(--red); color: #fff; }

  .error-msg {
    color: var(--red);
    font-size: 13px;
    margin-top: 8px;
  }

  /* ── Health banner ─────────────────────────────────── */
  .banner {
    display: none;
    padding: 10px 16px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .banner.visible { display: block; }
  .banner.degraded { background: #3a2a1a; color: var(--orange); }
  .banner.broken { background: #3a1a1a; color: var(--red); }
  .banner strong { font-weight: 600; }
  .banner.recovery { background: #1a2a3a; color: var(--accent); }
  .truncation-hint {
    margin-top: 6px;
    padding: 6px 10px;
    border-left: 3px solid var(--orange);
    background: #2a1f10;
    color: var(--orange);
    font-size: 12px;
  }
  .recovery-action {
    margin-left: 8px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-size: 12px;
    cursor: pointer;
  }
  .recovery-action.recovery-drop { color: var(--red); border-color: var(--red); }

  /* ── Empty state ────────────────────────────────────── */
  .empty {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-dim);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="banner" id="health-banner"></div>
<div class="banner recovery" id="recovery-banner"></div>

<header>
  <h1>Notulen</h1>
  <p>Neem op, transcribeer, genereer notulen</p>
</header>

<!-- Recording section -->
<div class="section">
  <div class="section-title">Nieuwe opname</div>
  <div class="field">
    <label for="title">Onderwerp</label>
    <input type="text" id="title" placeholder="Bijv. Weekoverleg team">
  </div>
  <div class="field">
    <label for="meeting-date">Datum</label>
    <input type="date" id="meeting-date">
  </div>
  <div class="field">
    <label>Aanwezigen</label>
    <div class="chip-suggestions" id="team-chips"></div>
    <input type="text" id="attendees-extra" placeholder="Overige aanwezigen (kommagescheiden)">
  </div>

  <div class="field">
    <label for="agenda">Agenda (optioneel)</label>
    <textarea id="agenda" rows="3" placeholder="1. Stand van zaken project X&#10;2. Planning volgende sprint&#10;3. Rondvraag"></textarea>
  </div>

  <div class="record-area">
    <button class="rec-btn" id="rec-btn" onclick="toggleRecording()">
      <div class="dot"></div>
    </button>
    <div class="rec-status" id="rec-status">Tik om op te nemen</div>
    <div class="timer" id="timer">00:00</div>
    <div class="waveform" id="waveform">
      <canvas id="waveform-canvas"></canvas>
    </div>
  </div>

  <div class="processing" id="processing">
    <div class="spinner"></div>
    <div class="processing-label" id="processing-label">Uploading...</div>
  </div>
</div>

<!-- Jobs section -->
<div class="section">
  <div class="section-title">Vergaderingen</div>
  <div id="jobs-list">
    <div class="empty">Nog geen opnames</div>
  </div>
</div>

<script src="/dashboard.js"></script>
</body>
</html>
