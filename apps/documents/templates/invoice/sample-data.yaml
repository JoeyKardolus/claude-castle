# Sample data for the invoice template. Render it with:
#   uv run python -m documents invoice --sample --out /tmp/invoice-sample.pdf
#
# Everything here is fictional. The issuing company block comes from
# design/company.yaml, not from this file.

invoice_number: INV-2026-0042
date: "2026-07-01"
due_date: "2026-07-31"
reference: PO-8891

# Currency symbol and VAT percentage; both optional (defaults: "€" and 21).
currency: "€"
vat_percent: 21

customer:
  name: Example Consulting
  contact: A. de Vries
  address: Voorbeeldstraat 12
  postal_code: 1234 AB
  city: Amsterdam
  country: Netherlands

line_items:
  - description: Website redesign
    details: Design and build of the new marketing site, June 2026.
    qty: 1
    unit_price: 3200.00
  - description: Hosting and maintenance
    details: Monthly fee, July through September 2026.
    qty: 3
    unit_price: 95.00

payment_terms: Payment within 30 days of the invoice date.
notes: Thank you for your business.

